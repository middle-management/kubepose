apiVersion: v1
kind: Service
metadata:
  annotations:
    kubepose.workload: StatefulSet
  name: database
spec:
  ports:
  - name: "5432"
    port: 5432
    protocol: TCP
    targetPort: 5432
  selector:
    app.kubernetes.io/name: database
status:
  loadBalancer: {}

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  annotations:
    kubepose.workload: StatefulSet
  name: database
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: database
  serviceName: database
  template:
    metadata:
      annotations:
        kubepose.workload: StatefulSet
      labels:
        app.kubernetes.io/name: database
    spec:
      containers:
      - image: postgres:16
        imagePullPolicy: IfNotPresent
        name: database
        ports:
        - containerPort: 5432
          protocol: TCP
        resources: {}
      restartPolicy: Always
  updateStrategy: {}
status:
  availableReplicas: 0
  replicas: 0
