apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: app
  strategy: {}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app
    spec:
      containers:
      - args:
        - id
        image: alpine
        imagePullPolicy: IfNotPresent
        name: app
        resources: {}
      restartPolicy: Always
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsUser: 1000
        supplementalGroups:
        - 999
status: {}

---
apiVersion: v1
kind: Service
metadata:
  name: app
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: app
status:
  loadBalancer: {}
