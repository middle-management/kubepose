apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kubepose.hpa.maxReplicas: "10"
    kubepose.hpa.minReplicas: "2"
    kubepose.hpa.targetCPUUtilization: "75"
  name: api
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: api
  strategy: {}
  template:
    metadata:
      annotations:
        kubepose.hpa.maxReplicas: "10"
        kubepose.hpa.minReplicas: "2"
        kubepose.hpa.targetCPUUtilization: "75"
      labels:
        app.kubernetes.io/name: api
    spec:
      containers:
      - image: nginx
        imagePullPolicy: IfNotPresent
        name: api
        ports:
        - containerPort: 8080
          protocol: TCP
        resources: {}
      restartPolicy: Always
status: {}

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  annotations:
    kubepose.hpa.maxReplicas: "10"
    kubepose.hpa.minReplicas: "2"
    kubepose.hpa.targetCPUUtilization: "75"
  name: api
spec:
  maxReplicas: 10
  metrics:
  - resource:
      name: cpu
      target:
        averageUtilization: 75
        type: Utilization
    type: Resource
  minReplicas: 2
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
status:
  currentMetrics: null
  desiredReplicas: 0

---
apiVersion: v1
kind: Service
metadata:
  annotations:
    kubepose.hpa.maxReplicas: "10"
    kubepose.hpa.minReplicas: "2"
    kubepose.hpa.targetCPUUtilization: "75"
  name: api
spec:
  ports:
  - name: "8080"
    port: 8080
    protocol: TCP
    targetPort: 8080
  selector:
    app.kubernetes.io/name: api
status:
  loadBalancer: {}
