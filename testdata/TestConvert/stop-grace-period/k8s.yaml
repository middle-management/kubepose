apiVersion: apps/v1
kind: Deployment
metadata:
  name: fast-worker
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: fast-worker
  strategy: {}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fast-worker
    spec:
      containers:
      - image: busybox
        imagePullPolicy: IfNotPresent
        name: fast-worker
        resources: {}
      restartPolicy: Always
      terminationGracePeriodSeconds: 1
status: {}

